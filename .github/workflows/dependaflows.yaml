name: Dependabot auto

on: pull_request

permissions: {}

jobs:
  dependabot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # github.actor is checked as well as user.login. user.login alone is a review bypass: a
    # collaborator pushing a commit to a dependabot/* branch fires `synchronize` while
    # pull_request.user.login is still dependabot[bot], so human-authored code would be approved
    # and merged unread.
    if: >-
      github.repository == 'lloydmeta/aminam' &&
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.DEPENDABOT_FLOW_TOKEN }}"
      - name: Approve a PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.DEPENDABOT_FLOW_TOKEN }}
      - name: Enable auto-merge for Dependabot PRs
        # Auto-merge queues behind the required status checks configured on main, so CI still gates
        # the merge even when the approve step above did not run.
        if: always()
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.DEPENDABOT_FLOW_TOKEN }}
