name: Dependency Submission

on:
  push:
    branches: [ main ]

permissions: {}

concurrency:
  # The graph describes the tip of main; only the latest submission matters.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-submission:
    name: Submit dependency graph
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # required by the dependency submission API; there is no narrower scope
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # gradle.properties enables the configuration cache globally and this build inherits it.
          # The dependency-graph plugin hooks resolution through build services and listeners that
          # the configuration cache restricts. Drop this flag if the first run is green without it.
          additional-arguments: --no-configuration-cache
