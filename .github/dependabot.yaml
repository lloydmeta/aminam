version: 2

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

    # Let a release sit in the wild before taking it.
    cooldown:
      default-days: 7
      semver-major-days: 14

    groups:
      quarkus:
        patterns:
          - "io.quarkus*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
