quarkus.application.name=aminam

# Postgres is the system of record. Dev/test start a container automatically via
# Dev Services; prod (Docker Compose) reaches it via the compose service name.
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${POSTGRES_USER:aminam}
%prod.quarkus.datasource.password=${POSTGRES_PASSWORD}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:aminam}

quarkus.rest.jackson.optimization.enable-reflection-free-serializers=false

# OpenAPI: write the generated schema (openapi.json + openapi.yaml) to ./api at build time.
quarkus.smallrye-openapi.store-schema-directory=api

# Flyway owns the schema; Hibernate only validates against it and never emits DDL.
quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.schema-management.strategy=validate

# Redis: dev services start a container automatically in dev/test mode.
# In prod (Docker Compose), the service is reachable via the compose service name.
%prod.quarkus.redis.hosts=redis://redis:6379

# Authentication. Anonymous requests are not auto-challenged (no basic-auth popup);
# the resource decides (API 401, UI redirect later).
quarkus.http.auth.proactive=false

# JWT (RS256). We own signing and verification (SmallRye JWT used as a library, not the auto
# mp-jwt mechanism), so the issuer/audience/lifetime are our own config.
aminam.jwt.issuer=https://aminam.beachape.com
aminam.jwt.audience=aminam
aminam.jwt.lifespan-seconds=1800
aminam.jwt.clock-skew-seconds=30

# Signing keys. If unset (dev/test), an ephemeral RSA-2048 keypair is generated at startup with a
# warning. Prod mounts static keys (generate with `make keys`; see README).
%prod.aminam.jwt.private-key-location=/keys/jwt-private.pem
%prod.aminam.jwt.public-key-location=/keys/jwt-public.pem

# Auth cookie hardening. Secure is dropped in dev for plain-http local use.
aminam.auth.cookie-secure=true
%dev.aminam.auth.cookie-secure=false

%test.quarkus.log.category."org.testcontainers".level=WARN
%test.quarkus.log.category."tc".level=WARN
%test.quarkus.log.category."com.github.dockerjava".level=WARN
