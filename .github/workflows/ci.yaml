name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Deny by default; each job opts in to exactly what it needs.
permissions: {}

concurrency:
  # On pull_request, head_ref is the source branch, so a force-push cancels the superseded run.
  # On push to main, head_ref is empty and run_id keeps each group unique, so nothing is cancelled
  # and every commit on main keeps a durable status.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    # Default is 360 minutes. A Dev Services container that never becomes ready would otherwise
    # burn six hours of runner time and hold the concurrency group the whole while.
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      # Safe only because the runner is ephemeral: there is nothing to reap once the VM dies.
      # Never set this locally.
      TESTCONTAINERS_RYUK_DISABLED: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # This job executes third-party bytecode: Gradle plugins, Error Prone processors, Quarkus
          # augmentation, and unpinned Postgres/Redis images pulled at test time. checkout's default
          # writes GITHUB_TOKEN into .git/config where any of that can read it. Nothing here pushes.
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # main seeds the dependency and build caches; branches read them. Stops every PR from
          # churning the 10 GB per-repo budget and evicting main's entry.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build
        # build = spotlessCheck + compile (-Werror, Error Prone, NullAway) + test (Dev Services
        # boots Postgres + Redis) + quarkusBuild, which augments under the prod profile and is
        # what constructs the build/quarkus-app/ that Dockerfile.jvm ships.
        run: ./gradlew build

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: build/test-results/test/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload HTML reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-reports
          path: build/reports/
          retention-days: 30
          if-no-files-found: warn

  report:
    name: Publish test results
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read   # download the artifact produced by the build job
      checks: write   # create the check run
    steps:
      # Deliberately a separate job. checks: write can forge a green check run, so it must never be
      # live while third-party build code is executing. This job runs no project code: it downloads
      # an artifact and parses XML.
      - name: Publish JUnit results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          artifact: test-results
          name: Gradle Tests
          path: '**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: true
